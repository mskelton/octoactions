<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 13px;
        color: #1f2328;
        width: 320px;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .description {
        color: #656d76;
        font-size: 12px;
        margin-bottom: 8px;
      }
      input[type="password"],
      select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #d1d9e0;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      button {
        background: #1f883d;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background: #1a7f37;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #1a7f37;
        text-align: center;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>OctoActions Settings</h1>

    <label for="token">GitHub Token</label>
    <p class="description">
      Personal access token with <code>repo</code> scope.
    </p>
    <input type="password" id="token" placeholder="ghp_..." />

    <label for="merge-method">Merge Method</label>
    <select id="merge-method">
      <option value="squash">Squash and merge</option>
      <option value="merge">Create a merge commit</option>
      <option value="rebase">Rebase and merge</option>
    </select>

    <button id="save">Save</button>
    <p class="status" id="status"></p>

    <script type="module" src="../lib/popup.ts"></script>
  </body>
</html>
